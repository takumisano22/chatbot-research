name: Run-batch-and-store

on:
  workflow_dispatch:
    inputs:
      pair_file:
        description: "実行する pair ファイル名"
        required: true
        type: string

jobs:
  batch-runner:
    if: github.actor == 'takumisano22'
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repo research
        uses: actions/checkout@v4

      - name: Copy .env and ingest_document
        shell: cmd
        run: |
          copy C:\actions-runner\_secrets\chatbot-research\.env .env
          xcopy /E /I /Y C:\actions-runner\_secrets\chatbot-research\ingest_document\DOCSET-0001\* ingest_document\DOCSET-0001\
          xcopy /E /I /Y C:\actions-runner\_secrets\chatbot-research\qa_datasets\* qa_datasets\

      - name: Run batch
        shell: cmd
        run: |
          docker compose build
          docker compose run --rm experiment_runner --research-pair "${{ inputs.pair_file }}"

      - name: Checkout repo scoring
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SCORING_REPOSITORY }}
          token: ${{ secrets.SCORING_WRITE_TOKEN }}
          path: chatbot-scoring

      - name: Copy csv to scoring
        shell: cmd
        run: |
          copy outputs\${{ inputs.pair_file }}*.csv chatbot-scoring\input\csv\
      
      - name: commit and push to scoring
        shell: cmd
        run: |
          git config --global --add safe.directory "C:\actions-runner\_work\chatbot-research\chatbot-research\chatbot-scoring"
          cd chatbot-scoring
          git config user.name "GitHub Actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add input/csv/
          git commit -m "Add batch output for ${{ inputs.pair_file }}" || echo "No changes to commit"
          git push