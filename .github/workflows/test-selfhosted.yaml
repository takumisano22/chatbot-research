name: Test self-hosted runner

on:
  workflow_dispatch:

jobs:
  test-runner:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy .env
        shell: cmd
        run: |
          copy C:\actions-runner\_secrets\chatbot-research\.env .env

      - name: Run batch
        shell: cmd
        run: |
          docker compose build
          docker compose run --rm experiment_runner --research-pair RP-test-0001


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selfhosted-test-outputs
          path: outputs/RP-test-0001*.csv