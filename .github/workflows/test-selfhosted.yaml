name: Test self-hosted runner

on:
  workflow_dispatch:
    inputs:
      pair_file:
        description: "実行する pair ファイル名"
        required: true
        type: string

jobs:
  test-runner:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy .env
        shell: cmd
        run: |
          copy C:\actions-runner\_secrets\chatbot-research\.env .env

      - name: Run batch
        shell: cmd
        run: |
          docker compose build
          docker compose run --rm experiment_runner --research-pair "${{ inputs.pair_file }}"


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selfhosted-test-outputs
          path: outputs/${{ inputs.pair_file }}*.csv