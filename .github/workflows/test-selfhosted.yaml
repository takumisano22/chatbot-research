name: Test self-hosted runner

on:
  workflow_dispatch:

jobs:
  test-runner:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show basic info
        shell: cmd
        run: |
          echo Runner OK
          hostname
          echo %DATE% %TIME%
          cd

      - name: Create test file
        shell: cmd
        run: |
          if not exist output mkdir output
          echo hello from self-hosted runner > output\test.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selfhosted-test-output
          path: output/test.txt