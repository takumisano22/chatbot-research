# RAG 実験バッチ専用: vector_store (Chroma) + experiment_runner。
# 例: docker compose run --rm experiment_runner --research-pair RP-0001
# GitHub Actions の self-hosted runner からも同じコマンドで起動できる。

x-experiment-image: &experiment_image
  build:
    context: .
    dockerfile: backend/Dockerfile
  image: rag-experiment-runner:latest
  env_file:
    - .env

services:
  vector_store:
    image: chromadb/chroma:1.5.7
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
      CHROMA_CORS_ALLOW_ORIGINS: '["http://localhost:8090","http://127.0.0.1:8090"]'
      ANONYMIZED_TELEMETRY: "False"
    volumes:
      - rag_vector_provider_data:/data

  experiment_runner:
    <<: *experiment_image
    entrypoint: ["python", "-m", "app.experiment.runner"]
    depends_on:
      vector_store:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./research_pairs:/app/research_pairs
      - ./qa_datasets:/app/qa_datasets
      - ./ingest_document:/app/ingest_document
      - ./outputs:/app/outputs

volumes:
  rag_vector_provider_data:
    name: ${VECTOR_STORE_PROVIDER:-chroma}_experiment_data
